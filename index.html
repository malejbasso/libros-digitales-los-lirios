<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Libro Digital</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4d4d4d, #2f2f2f);
            overflow: auto;
            font-family: Arial;
        }

        /* =========================
           CONTROLES (TOP BAR)
        ========================= */
        #controls {
            width: calc(100% - 40px);
            margin: 20px auto;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            background: rgba(20,20,20,.85);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,.35);
            box-sizing: border-box;
            gap: 10px;
        }

        .controls-left,
        .controls-center,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .controls-center {
            flex: 1;
            justify-content: center;
        }


        /* 🔥 Distribución tipo “10% por elemento” */
        #controls > * {
            flex: 0 0 auto; /* ❗ evita que crezcan */
            text-align: center;
        }

        /* INPUT más ancho que los botones */
        #searchInput {
            width: 320px;
            max-width: 40vw;
            padding: 8px 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            outline: none;
            background: rgba(255,255,255,.95);
            box-shadow: inset 0 2px 4px rgba(0,0,0,.15);
        }

        /* BOTONES */
        button {
            padding: 7px 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #2f2f2f, #1d1d1d);
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: .2s;
            box-shadow: 0 3px 8px rgba(0,0,0,.3);
            white-space: nowrap;
        }

            button:hover {
                transform: translateY(-2px);
                background: linear-gradient(145deg, #4da6ff, #2563eb);
            }

        /* =========================
           INFO / PAGINACIÓN
        ========================= */
        #pageNumber {
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,.08);
        }

        #searchInfo {
            color: white;
            font-size: 12px;
            opacity: 0.85;
            min-width: 160px;
            text-align: right;
        }

        /* =========================
           RESULTADO BUSQUEDA
        ========================= */
        #searchResultPreview {
            width: min(1200px, calc(100% - 30px));
            margin: 0 auto 20px auto;
            background: rgba(0,0,0,.35);
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        mark {
            background: #ffd54a;
            color: black;
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* =========================
           MAIN LAYOUT
        ========================= */
        #mainContainer {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* =========================
           THUMBNAILS
        ========================= */
        #thumbnails {
            width: 240px;
            height: 700px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px;
            background: rgba(0,0,0,.18);
            border-radius: 12px;
            flex-shrink: 0; /* 🔥 clave: no se encoge */
        }

            #thumbnails::-webkit-scrollbar {
                width: 10px;
            }

            #thumbnails::-webkit-scrollbar-track {
                background: rgba(255,255,255,.1);
                border-radius: 10px;
            }

            #thumbnails::-webkit-scrollbar-thumb {
                background: rgba(255,255,255,.25);
                border-radius: 10px;
            }

        .thumbnail {
            width: 180px;
            height: 180px;
            min-width: 180px;
            min-height: 180px;
            max-width: 180px;
            max-height: 180px;
            flex: 0 0 auto; /* 🔥 evita que flex las aplaste */

            border-radius: 10px;
            overflow: hidden;
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            box-shadow: 0 2px 5px rgba(0,0,0,.3);
        }

            .thumbnail:hover {
                transform: scale(1.03);
            }

            .thumbnail canvas {
                width: 100%;
                height: 100%;
                display: block;
                object-fit: contain;
            }

        /* =========================
           FLIPBOOK
        ========================= */
        #flipbook {
            flex-shrink: 0;
            margin: 0 auto;
        }

            #flipbook .page {
                background: white;
                display: flex;
                justify-content: center;
                align-items: center;
                border: 1px solid #ccc;
            }

            #flipbook .hard {
                background: #222;
                box-shadow: inset 0 0 10px rgba(255,255,255,.2), 0 0 15px rgba(0,0,0,.5);
            }

        .page canvas {
            width: 100%;
            height: 100%;
        }

        /* =========================
           RESPONSIVE
        ========================= */
        @media (max-width: 900px) {

            #controls {
                flex-wrap: wrap;
            }

            .controls-center {
                order: 3;
                width: 100%;
                justify-content: center;
            }

            #searchInput {
                width: 100%;
            }

            #thumbnails {
                display: none;
            }
        }
    </style>

</head>

<body>

    <div id="controls">

        <div class="controls-left">
            <button id="prevBtn">◀</button>
            <span id="pageNumber">Página 1</span>
            <button id="nextBtn">▶</button>
        </div>

        <div class="controls-center">
            <input type="text" id="searchInput" />
            <button id="searchBtn">🔎</button>
            <button id="prevSearchBtn">⬅</button>
            <button id="nextSearchBtn">➡</button>
            <span id="searchInfo"></span>
        </div>

        <div class="controls-right">
            <button id="zoomInBtn">🔍+</button>
            <button id="zoomOutBtn">🔍-</button>
            <button id="fullscreenBtn">⛶</button>
        </div>

    </div>

    <div id="searchResultPreview"></div>

    <div id="mainContainer">

        <div id="thumbnails"></div>

        <div id="flipbook"></div>

    </div>

    <audio id="pageSound" src="wwwroot/audio/page-flip.mp3"></audio>

    <script src="wwwroot/js/jquery.js"></script>

    <script src="wwwroot/js/turn.js"></script>

    <script src="wwwroot/js/pdfjs/pdf.js"></script>

    <script>

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'wwwroot/js/pdfjs/pdf.worker.js';

        const url = `libro.pdf`;

        const pdfTextIndex = [];

        let searchResults = [];

        let currentSearchIndex = 0;

        async function loadBook() {

            const pdf =
                await pdfjsLib.getDocument(url).promise;

            const flipbook =
                document.getElementById('flipbook');

            const thumbnails =
                document.getElementById('thumbnails');

            for (let pageNum = 1;
                pageNum <= pdf.numPages;
                pageNum++) {

                const page =
                    await pdf.getPage(pageNum);

                // TEXTO PDF

                const textContent =
                    await page.getTextContent();

                const pageText =
                    textContent.items
                        .map(item => item.str)
                        .join(' ')
                        .toLowerCase();

                pdfTextIndex.push({

                    page: pageNum,

                    text: pageText
                });

                // PAGINA

                const viewport =
                    page.getViewport({ scale: 1.5 });

                const pageDiv =
                    document.createElement('div');

                if (pageNum === 1 ||
                    pageNum === pdf.numPages) {

                    pageDiv.className =
                        'page hard';

                } else {

                    pageDiv.className =
                        'page';
                }

                const canvas =
                    document.createElement('canvas');

                const context =
                    canvas.getContext('2d');

                canvas.width =
                    viewport.width;

                canvas.height =
                    viewport.height;

                pageDiv.appendChild(canvas);

                flipbook.appendChild(pageDiv);

                await page.render({

                    canvasContext: context,

                    viewport: viewport

                }).promise;

                // MINIATURAS

                const thumbViewport =
                    page.getViewport({ scale: 0.5 });

                const thumbDiv =
                    document.createElement('div');

                thumbDiv.className =
                    'thumbnail';

                thumbDiv.dataset.page =
                    pageNum;

                const thumbCanvas =
                    document.createElement('canvas');

                const thumbContext =
                    thumbCanvas.getContext('2d');

                thumbCanvas.width =
                    thumbViewport.width;

                thumbCanvas.height =
                    thumbViewport.height;

                thumbDiv.appendChild(
                    thumbCanvas);

                thumbnails.appendChild(
                    thumbDiv);

                await page.render({

                    canvasContext:
                        thumbContext,

                    viewport:
                        thumbViewport

                }).promise;

                thumbDiv.addEventListener(
                    'click',
                    () => {

                        $('#flipbook')
                            .turn(
                                'page',
                                pageNum);
                    });
            }

            const bookWidth =
                Math.min(
                    window.innerWidth * 0.9,
                    1200);

            const bookHeight =
                Math.min(
                    window.innerHeight * 0.8,
                    800);

            let currentScale = 1;

            $('#flipbook').turn({

                width: bookWidth,

                height: bookHeight,

                display: 'double',

                duration: 1200,

                autoCenter: true,

                gradients: true,

                acceleration: true,

                elevation: 50,

                when: {

                    turning: function () {

                        const sound =
                            document
                                .getElementById(
                                    'pageSound');

                        sound.pause();

                        sound.currentTime = 0;

                        sound.play()
                            .catch(() => { });
                    },

                    turned: function (e, page) {

                        document
                            .getElementById(
                                'pageNumber')
                            .innerText =
                            `Página ${page}`;

                        document
                            .querySelectorAll(
                                '.thumbnail')
                            .forEach(t =>
                                t.style.borderColor =
                                'transparent');

                        const activeThumb =
                            document.querySelector(
                                `.thumbnail[data-page='${page}']`);

                        if (activeThumb) {

                            activeThumb
                                .style
                                .borderColor =
                                '#4da6ff';

                            activeThumb
                                .scrollIntoView({

                                    behavior:
                                        'smooth',

                                    block:
                                        'nearest'
                                });
                        }
                    }
                }
            });

            // BOTONES

            document
                .getElementById('nextBtn')
                .addEventListener(
                    'click',
                    () => {

                        $('#flipbook')
                            .turn('next');
                    });

            document
                .getElementById('prevBtn')
                .addEventListener(
                    'click',
                    () => {

                        $('#flipbook')
                            .turn('previous');
                    });

            // TECLADO

            document.addEventListener(
                'keydown',
                (e) => {

                    if (e.key === 'ArrowRight') {

                        $('#flipbook')
                            .turn('next');
                    }

                    if (e.key === 'ArrowLeft') {

                        $('#flipbook')
                            .turn('previous');
                    }
                });

            // FULLSCREEN

            document
                .getElementById(
                    'fullscreenBtn')
                .addEventListener(
                    'click',
                    () => {

                        if (!document
                            .fullscreenElement) {

                            document
                                .documentElement
                                .requestFullscreen();

                        } else {

                            document
                                .exitFullscreen();
                        }
                    });

            // ZOOM

            document
                .getElementById(
                    'zoomInBtn')
                .addEventListener(
                    'click',
                    () => {

                        currentScale += 0.1;

                        $('#flipbook').turn(
                            'size',
                            bookWidth *
                            currentScale,

                            bookHeight *
                            currentScale
                        );
                    });

            document
                .getElementById(
                    'zoomOutBtn')
                .addEventListener(
                    'click',
                    () => {

                        currentScale =
                            Math.max(
                                0.5,
                                currentScale - 0.1);

                        $('#flipbook').turn(
                            'size',
                            bookWidth *
                            currentScale,

                            bookHeight *
                            currentScale
                        );
                    });

            // BUSQUEDA

            document
                .getElementById(
                    'searchBtn')
                .addEventListener(
                    'click',
                    searchText);

            document
                .getElementById(
                    'searchInput')
                .addEventListener(
                    'keydown',
                    (e) => {

                        if (e.key === 'Enter') {

                            searchText();
                        }
                    });

            document
                .getElementById(
                    'nextSearchBtn')
                .addEventListener(
                    'click',
                    () => {

                        if (searchResults
                            .length === 0)
                            return;

                        currentSearchIndex =
                            (currentSearchIndex + 1)
                            % searchResults.length;

                        goToSearchResult();
                    });

            document
                .getElementById(
                    'prevSearchBtn')
                .addEventListener(
                    'click',
                    () => {

                        if (searchResults
                            .length === 0)
                            return;

                        currentSearchIndex--;

                        if (currentSearchIndex < 0) {

                            currentSearchIndex =
                                searchResults.length - 1;
                        }

                        goToSearchResult();
                    });
        }

        loadBook();

        function searchText() {

            const search =
                document
                    .getElementById(
                        'searchInput')
                    .value
                    .toLowerCase()
                    .trim();

            if (!search)
                return;

            searchResults =
                pdfTextIndex.filter(p =>
                    p.text.includes(search));

            currentSearchIndex = 0;

            if (searchResults.length > 0) {

                goToSearchResult();

            } else {

                document
                    .getElementById(
                        'searchInfo')
                    .innerText =
                    'Sin resultados';

                document
                    .getElementById(
                        'searchResultPreview')
                    .innerHTML = '';
            }
        }

        function goToSearchResult() {

            const result =
                searchResults[currentSearchIndex];

            $('#flipbook')
                .turn(
                    'page',
                    result.page);

            document.getElementById('searchInfo').innerText =
                `Resultado ${currentSearchIndex + 1} de ${searchResults.length} | Página ${result.page}`;

            const search =
                document
                    .getElementById(
                        'searchInput')
                    .value
                    .toLowerCase();

            const text =
                result.text;

            const index =
                text.indexOf(search);

            const start =
                Math.max(0, index - 60);

            const end =
                Math.min(
                    text.length,
                    index + search.length + 60);

            let snippet =
                text.substring(start, end);

            snippet =
                snippet.replaceAll(
                    search,
                    `<mark>${search}</mark>`);

            document
                .getElementById(
                    'searchResultPreview')
                .innerHTML =

                `Página ${result.page}<br><br>
                         ...${snippet}...`;
        }

    </script>

</body>

</html>
