<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Builder - Libro Digital</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1f1f1f, #111);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CARD PRINCIPAL */
        .card {
            width: 450px;
            padding: 25px;
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 35px rgba(0,0,0,.5);
            text-align: center;
        }

        /* TITULO */
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* INPUT FILE */
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            border: none;
            color: black;
            font-size: 14px;
        }

        /* BOTON */
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #4da6ff, #2563eb);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: .2s;
        }

            button:hover {
                transform: translateY(-2px);
            }

        /* ESTADO */
        #status {
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.8;
        }

        /* RESULTADO */
        #result {
            margin-top: 15px;
            font-size: 13px;
            word-break: break-word;
        }

        a {
            color: #4da6ff;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>📚 Builder Libro Digital</h1>

        <input type="file" id="pdfInput" accept="application/pdf">

        <button onclick="upload()">Convertir y publicar</button>

        <div id="status"></div>

        <div id="result"></div>

    </div>

    <script>

async function upload() {

    const file = document.getElementById("pdfInput").files[0];

    if (!file) {
        alert("Selecciona un PDF");
        return;
    }

    document.getElementById("status").innerText =
        "Subiendo PDF...";

    const formData = new FormData();
    formData.append("file", file);

    try {

        const res = await fetch("/api/books/upload", {
            method: "POST",
            body: formData
        });

        if (!res.ok) {
            throw new Error("Error al subir");
        }

        const data = await res.json();

        document.getElementById("status").innerText =
            "Libro creado exitosamente";

        document.getElementById("result").innerHTML = `
            📖 Libro listo:<br><br>
            <a href="${data.url}" target="_blank">
                Abrir libro digital
            </a>
        `;

    } catch (err) {

        document.getElementById("status").innerText =
            "Error al crear libro";
    }
}

    </script>

</body>
</html>
